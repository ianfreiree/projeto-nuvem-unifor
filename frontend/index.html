<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Catálogo Inteligente - Unifor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>🚀 Catálogo Inteligente</h1>
            <button onclick="logout()" style="background: #ff4757; padding: 5px 10px;">Sair</button>
        </header>
        
        <section id="cadastro">
            <h2 id="form-titulo">Cadastrar Novo Produto</h2>
            
            <input type="hidden" id="produto-id"> 
            
            <input type="text" id="nome" placeholder="Nome do Produto">
            <input type="number" id="preco" placeholder="Preço (R$)">
            <input type="text" id="categoria" placeholder="Categoria">
            
            <button id="btn-salvar" onclick="salvarProduto()">Salvar na Nuvem 🔥</button>
        </section>

        <hr>

        <section id="lista">
            <h2>Produtos no Estoque</h2>
            <div id="produtos-grid">
                </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
